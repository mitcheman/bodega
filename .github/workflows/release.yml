name: Release

# Triggered by pushing a version tag (e.g. `git tag v0.2.0 && git push origin v0.2.0`).
# Publishes both SDK packages to npm and creates a GitHub Release with notes
# from CHANGELOG.md.
#
# Required secret:
#   NPM_TOKEN — an automation token from https://www.npmjs.com/settings/<user>/tokens
#
# Add via: gh secret set NPM_TOKEN

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node with npm registry
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(jq -r '.version' package.json)
          COMMERCE_VERSION=$(jq -r '.version' packages/commerce/package.json)
          STUDIO_VERSION=$(jq -r '.version' packages/studio/package.json)
          if [ "$TAG" != "$PKG_VERSION" ] || [ "$TAG" != "$COMMERCE_VERSION" ] || [ "$TAG" != "$STUDIO_VERSION" ]; then
            echo "❌ Tag $TAG does not match all package versions."
            echo "  root:     $PKG_VERSION"
            echo "  commerce: $COMMERCE_VERSION"
            echo "  studio:   $STUDIO_VERSION"
            exit 1
          fi
          echo "✓ All versions match tag $TAG"

      - name: Build SDK packages
        run: pnpm -r build

      - name: Publish @bodega/commerce to npm
        run: pnpm --filter "@bodega/commerce" publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @bodega/studio to npm
        run: pnpm --filter "@bodega/studio" publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          NOTES=$(awk -v v="$VERSION" '
            /^## \[/ { if (p) exit; if ($0 ~ "\\["v"\\]") { p=1; next } }
            p { print }
          ' CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: ${{ startsWith(github.ref, 'refs/tags/v0.') }}
