name: Release

# Triggered by pushing a version tag (e.g. `git tag v0.2.0 && git push origin v0.2.0`).
# Creates a GitHub Release and publishes @mitcheman/bodega to npm using
# OIDC / Trusted Publishing — no NPM_TOKEN needed.
#
# Prerequisite (one-time): configure npm Trusted Publisher on the package
# at npmjs.com/package/@mitcheman/bodega/access → Trusted Publishers.
# Repository: mitcheman/bodega, workflow filename: release.yml.

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
        # Intentionally NO registry-url — it sets a placeholder
        # NODE_AUTH_TOKEN that breaks npm's Trusted Publishing OIDC flow.


      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          ROOT_VERSION=$(jq -r '.version' package.json)
          SDK_VERSION=$(jq -r '.version' packages/bodega/package.json)
          if [ "$TAG" != "$ROOT_VERSION" ] || [ "$TAG" != "$SDK_VERSION" ]; then
            echo "❌ Tag $TAG does not match package versions."
            echo "  root:            $ROOT_VERSION"
            echo "  @mitcheman/bodega: $SDK_VERSION"
            exit 1
          fi
          echo "✓ Versions match tag $TAG"

      - name: Build SDK
        run: pnpm --filter "@mitcheman/bodega" build

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          NOTES=$(awk -v v="$VERSION" '
            /^## \[/ { if (p) exit; if ($0 ~ "\\["v"\\]") { p=1; next } }
            p { print }
          ' CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: ${{ startsWith(github.ref, 'refs/tags/v0.') }}

      - name: Publish @mitcheman/bodega to npm (via OIDC)
        # `npx npm@latest` runs the newest npm CLI without needing to
        # self-update the bundled one (which breaks on corepack-managed
        # node installs). Trusted Publishing requires npm >= 11.5.1.
        working-directory: packages/bodega
        run: npx npm@latest publish --access public --provenance --ignore-scripts
